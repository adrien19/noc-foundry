# Keycloak dev instance for local OIDC testing with NOCFoundry.
# Usage:
#   docker compose -f docker/docker-compose.keycloak.yaml up -d
#   ./docker/keycloak-setup.sh
#   # then reference it in your tools YAML:
#   #   kind: authServices
#   #   type: oidc
#   #   issuerUrl: http://localhost:8180/realms/network-ops
#   #   clientId: noc-foundry
services:
  keycloak:
    image: quay.io/keycloak/keycloak:26.0
    platform: linux/amd64 # ARM64 hosts: forces amd64 via QEMU to avoid JDK 21 SIGILL
    command: start-dev
    environment:
      KC_HTTP_PORT: "8180"
      KEYCLOAK_ADMIN: admin
      KEYCLOAK_ADMIN_PASSWORD: admin
    ports:
      - "8180:8180"
    healthcheck:
      test:
        ["CMD-SHELL", "curl -sf http://localhost:8180/realms/master || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 20s
