# Reusable Nokia SR Linux lab catalog.
#
# This example demonstrates:
# - static device groups with SSH, gNMI, and NETCONF source templates
# - protocol-specific tool bindings
# - a small operator-facing toolset for common read-only inspection
#
# Default hosts match the management subnet in
# `examples/containerlab/noc-foundry-lab.clab.yaml`.
# Override the `*_HOST` environment variables if you customize that subnet.

---
kind: deviceGroups
name: nokia-srlinux-lab
type: static
sourceTemplates:
  ssh:
    type: ssh
    port: ${SSH_PORT:22}
    username: ${SSH_USER:admin}
    password: ${SSH_PASS:NokiaSrl1!}
    vendor: nokia
    platform: srlinux
    timeout: 30s
  gnmi:
    type: gnmi
    port: ${GNMI_PORT:57400}
    tls_insecure: true
    username: ${GNMI_USER:admin}
    password: ${GNMI_PASS:NokiaSrl1!}
    vendor: nokia
    platform: srlinux
    native_yang: true
    openconfig: false
  netconf:
    type: netconf
    port: ${NETCONF_PORT:830}
    username: ${SSH_USER:admin}
    password: ${SSH_PASS:NokiaSrl1!}
    vendor: nokia
    platform: srlinux
    native_yang: true
    openconfig: false
    timeout: 30s
devices:
  - name: spine-1
    host: ${SPINE1_HOST:172.31.250.12}
    labels:
      role: spine
      vendor: nokia
      site: lab-east
  - name: spine-2
    host: ${SPINE2_HOST:172.31.250.13}
    labels:
      role: spine
      vendor: nokia
      site: lab-east
  - name: leaf-1
    host: ${LEAF1_HOST:172.31.250.11}
    labels:
      role: leaf
      vendor: nokia
      site: lab-east
  - name: leaf-2
    host: ${LEAF2_HOST:172.31.250.14}
    labels:
      role: leaf
      vendor: nokia
      site: lab-east
  - name: leaf-3
    host: ${LEAF3_HOST:172.31.250.15}
    labels:
      role: leaf
      vendor: nokia
      site: lab-east

---
kind: tools
name: show_spine1_interfaces
type: network-show-interfaces
source: nokia-srlinux-lab/spine-1/ssh

---
kind: tools
name: show_spine1_interfaces_gnmi
type: network-show-interfaces
source: nokia-srlinux-lab/spine-1/gnmi

---
kind: tools
name: show_spine1_version
type: network-show-version
source: nokia-srlinux-lab/spine-1/ssh

---
kind: tools
name: show_spine1_command
type: network-show
source: nokia-srlinux-lab/spine-1/ssh
description: >-
  Run any read-only CLI command on spine-1 and optionally filter the result
  with a runtime jq expression.

---
kind: toolsets
name: spine-1-operations
description: >-
  Read-only Nokia SR Linux inspection workflow for a single spine device.
tools:
  - show_spine1_interfaces
  - show_spine1_interfaces_gnmi
  - show_spine1_version
  - show_spine1_command
