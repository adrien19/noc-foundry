# Nokia SR Linux YANG models fetched from Git repositories.
#
# This example demonstrates how to configure NOCFoundry to automatically
# clone YANG model repositories at startup instead of manually downloading
# and laying out the directory structure.
#
# Git repos are configured via the `schemaRepos` kind in the tools config
# YAML.  Each entry specifies a repo URL, optional authentication, and
# one or more version mappings that map a Git ref (branch/tag) to a
# NOCFoundry vendor/platform/version triple.
#
# Supported auth methods:
#   - none   (default): Public repos, no credentials needed.
#   - token  : HTTPS clone using a personal access token stored in an
#              environment variable.
#   - ssh    : SSH clone using a private key file.
#
# Repos are cloned once to a local cache directory and updated with
# `git pull` on subsequent server starts.  Override the cache location
# with `--schema-cache-dir`.
#
# Operations mappings (nocfoundry-ops.yaml sidecars) are resolved in
# this order for each version:
#   1. Explicit `opsFile` in the config (full replace)
#   2. nocfoundry-ops.yaml found in the cloned repo directory
#   3. Prebuilt default shipped inside the NOCFoundry binary
#   4. Hardcoded fallback for known vendors (nokia)
#
# Nokia SR Linux has a prebuilt default operation contract, so no opsFile is
# needed. The sidecar contract maps operation IDs to native/OpenConfig YANG
# paths, data kind, datastore behavior, protocol preference, parameters, and
# safety limits. For other vendors, specify opsFile to map YANG paths to
# operations.
#
# Start the server:
#
#   ./nocfoundry \
#     --tools-file examples/tools-configs/nokia-srlinux-git-repos.yaml \
#     --ui
#
# The `version` field on each source/deviceGroup links the device to the
# compiled YANG bundle automatically.

---
kind: schemaRepos
name: nokia-srlinux-yang
url: https://github.com/nokia/srlinux-yang-models
auth:
  type: none
  # For private repos, use one of:
  #   type: token
  #   tokenEnv: GITHUB_TOKEN
  # or:
  #   type: ssh
  #   sshKeyPath: ~/.ssh/id_ed25519
  #   sshKeyPassphraseEnv: SSH_PASSPHRASE
versions:
  - ref: v24.10
    vendor: nokia
    platform: srlinux
    version: v24.10
    path: "."
    # Optional full override. Use this when a repo/version needs custom native
    # paths or stricter operation limits than the embedded Nokia SR Linux
    # sidecar.
    # opsFile: /path/to/custom-ops-v24.yaml
  - ref: v25.10
    vendor: nokia
    platform: srlinux
    version: v25.10
    path: "."
    # opsFile: /path/to/custom-ops-v25.yaml  # optional override

---
kind: deviceGroups
name: nokia-git-lab
type: static
sourceTemplates:
  ssh:
    type: ssh
    port: ${SSH_PORT:22}
    username: ${SSH_USER:admin}
    password: ${SSH_PASS:NokiaSrl1!}
    vendor: nokia
    platform: srlinux
    version: v24.10
    timeout: 30s
  gnmi:
    type: gnmi
    port: ${GNMI_PORT:57400}
    tls_insecure: true
    username: ${GNMI_USER:admin}
    password: ${GNMI_PASS:NokiaSrl1!}
    vendor: nokia
    platform: srlinux
    version: v24.10
    native_yang: true
    openconfig: false
  netconf:
    type: netconf
    port: ${NETCONF_PORT:830}
    username: ${SSH_USER:admin}
    password: ${SSH_PASS:NokiaSrl1!}
    vendor: nokia
    platform: srlinux
    version: v24.10
    native_yang: true
    openconfig: false
    timeout: 30s
devices:
  - name: srl1
    host: ${SRL1_HOST:172.31.250.11}
    labels:
      role: leaf
      vendor: nokia
  - name: srl2
    host: ${SRL2_HOST:172.31.250.12}
    labels:
      role: spine
      vendor: nokia


# --- Schema-aware tools (gNMI / NETCONF) ---
# These tools use the YANG bundles cloned from the Git repo above. Tools only
# reference sources; they do not embed YANG paths. The schema-derived profile
# resolves native_paths/oc_paths automatically from nocfoundry-ops.yaml.

---
# Show interfaces on srl1 via gNMI using schema-derived paths.
kind: tools
name: show_srl1_interfaces_gnmi
type: network-show-interfaces
source: nokia-git-lab/srl1/gnmi

---
# Show interfaces on srl2 via gNMI.
kind: tools
name: show_srl2_interfaces_gnmi
type: network-show-interfaces
source: nokia-git-lab/srl2/gnmi

---
# Show interfaces on srl1 via NETCONF using schema-derived paths.
kind: tools
name: show_srl1_interfaces_netconf
type: network-show-interfaces
source: nokia-git-lab/srl1/netconf

---
# Show system version on srl1 via gNMI.
kind: tools
name: show_srl1_version_gnmi
type: network-show-version
source: nokia-git-lab/srl1/gnmi

---
# Show BGP neighbors through the schema-derived get_bgp_neighbors operation.
kind: tools
name: show_srl1_bgp_neighbors_gnmi
type: network-show-bgp-neighbors
source: nokia-git-lab/srl1/gnmi

---
# Show active alarms through the schema-derived get_system_alarms operation.
kind: tools
name: show_srl1_alarms_gnmi
type: network-show-alarms
source: nokia-git-lab/srl1/gnmi

---
# SSH command tool (uses hardcoded profile, not YANG schemas).
kind: tools
name: show_srl1_command
type: network-show
source: nokia-git-lab/srl1/ssh

---
kind: toolsets
name: nokia-lab-tools
tools:
  - show_srl1_interfaces_gnmi
  - show_srl2_interfaces_gnmi
  - show_srl1_interfaces_netconf
  - show_srl1_version_gnmi
  - show_srl1_bgp_neighbors_gnmi
  - show_srl1_alarms_gnmi
  - show_srl1_command
