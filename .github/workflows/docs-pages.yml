name: docs-pages

on:
  push:
    branches:
      - main
    tags:
      - "v*"
    paths:
      - ".webdocs/**"
      - ".github/workflows/docs-pages.yml"
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  docs:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0

      - name: Setup Hugo
        uses: peaceiris/actions-hugo@e3b661c523413d13d642651a5ba5fc0d2b344c0d # v3
        with:
          hugo-version: "0.146.0"
          extended: true

      - name: Setup Go
        uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version-file: .webdocs/go.mod

      - name: Setup Node
        uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6.3.0
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: .webdocs/package-lock.json

      - name: Install docs dependencies
        working-directory: .webdocs
        run: |
          go mod download
          npm ci

      - name: Validate docs build
        run: |
          ./.webdocs/scripts/build-versioned-site.sh \
            "https://docs.nocfoundry.com/dev/" \
            "$RUNNER_TEMP/nocfoundry-docs-build"

      - name: Prepare deployment metadata
        if: github.event_name != 'pull_request'
        run: |
          if [[ "${GITHUB_REF}" == "refs/heads/main" ]]; then
            echo "TARGET_DIR=dev" >> "$GITHUB_ENV"
            echo "BASE_URL=https://docs.nocfoundry.com/dev/" >> "$GITHUB_ENV"
            echo "PUBLISH_LATEST=false" >> "$GITHUB_ENV"
          elif [[ "${GITHUB_REF}" == refs/tags/v* ]]; then
            echo "TARGET_DIR=${GITHUB_REF_NAME}" >> "$GITHUB_ENV"
            echo "BASE_URL=https://docs.nocfoundry.com/${GITHUB_REF_NAME}/" >> "$GITHUB_ENV"
            echo "PUBLISH_LATEST=true" >> "$GITHUB_ENV"
          else
            echo "Unsupported ref for docs deployment: ${GITHUB_REF}" >&2
            exit 1
          fi

      - name: Build release docs artifact
        if: github.event_name != 'pull_request'
        run: |
          ./.webdocs/scripts/build-versioned-site.sh \
            "${BASE_URL}" \
            "$RUNNER_TEMP/nocfoundry-docs-release"

      - name: Publish to gh-pages
        if: github.event_name != 'pull_request'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail

          PAGES_DIR="$RUNNER_TEMP/gh-pages"
          REPO_URL="https://x-access-token:${GH_TOKEN}@github.com/${GITHUB_REPOSITORY}.git"

          if git ls-remote --exit-code --heads origin gh-pages >/dev/null 2>&1; then
            git clone --branch gh-pages --depth 1 "${REPO_URL}" "${PAGES_DIR}"
          else
            git clone --depth 1 "${REPO_URL}" "${PAGES_DIR}"
            cd "${PAGES_DIR}"
            git checkout --orphan gh-pages
            find . -mindepth 1 -maxdepth 1 ! -name .git -exec rm -rf {} +
            cd -
          fi

          mkdir -p "${PAGES_DIR}/${TARGET_DIR}"
          rsync -a --delete "$RUNNER_TEMP/nocfoundry-docs-release/" "${PAGES_DIR}/${TARGET_DIR}/"

          if [[ "${PUBLISH_LATEST}" == "true" ]]; then
            mkdir -p "${PAGES_DIR}/latest"
            rsync -a --delete "$RUNNER_TEMP/nocfoundry-docs-release/" "${PAGES_DIR}/latest/"
          fi

          ./.webdocs/scripts/render-root-index.sh "${PAGES_DIR}"
          ./.webdocs/scripts/render-versions-json.sh "${PAGES_DIR}"

          echo "docs.nocfoundry.com" > "${PAGES_DIR}/CNAME"
          touch "${PAGES_DIR}/.nojekyll"

          cd "${PAGES_DIR}"
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add .

          if git diff --cached --quiet; then
            echo "No docs changes to publish."
            exit 0
          fi

          git commit -m "docs: publish ${GITHUB_REF_NAME}"
          git push origin gh-pages
