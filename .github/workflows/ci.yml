name: ci

on:
  pull_request:
  push:
    branches:
      - main

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  go-lint:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Setup Go
        uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version-file: go.mod

      - name: Install golangci-lint
        run: go install github.com/golangci/golangci-lint/v2/cmd/golangci-lint@latest

      - name: Run golangci-lint
        run: golangci-lint run

  go-test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Setup Go
        uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version-file: go.mod

      - name: Run Go unit tests
        run: CGO_ENABLED=1 go test -race -v ./cmd/... ./internal/...

  go-compile:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Setup Go
        uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version-file: go.mod

      - name: Compile-check all packages
        run: go test -run '^$' ./...

      - name: Build CLI
        run: go build -o /tmp/nocfoundry .

      - name: Check CLI version output
        run: /tmp/nocfoundry --version >/dev/null

  ui-and-docs:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Setup Go
        uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version-file: .webdocs/go.mod

      - name: Setup Node
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: |
            package-lock.json
            .webdocs/package-lock.json

      - name: Setup Hugo
        uses: peaceiris/actions-hugo@75d2e84710de30f6ff7268e08f310b60ef14033f # v3
        with:
          hugo-version: "0.146.0"
          extended: true

      - name: Run UI JS tests
        run: |
          npm ci
          npm run test:ui-js

      - name: Build docs
        working-directory: .webdocs
        run: |
          go mod download
          npm ci
          hugo --source . --gc --minify

  metadata:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Validate server metadata
        run: |
          python3 - <<'PY'
          import json
          from pathlib import Path

          data = json.loads(Path("server.json").read_text())
          assert data["name"] == "io.github.noc-foundry/noc-foundry"
          assert data["version"]
          package = data["packages"][0]
          assert package["registryType"] == "oci"
          assert package["identifier"] == "ghcr.io/adrien19/noc-foundry:{version}"
          arg_names = {arg["name"] for arg in package["runtimeArguments"]}
          required = {"--tools-file", "--tools-files", "--tools-folder", "--server-config", "--validation-config", "--prebuilt"}
          missing = sorted(required - arg_names)
          assert not missing, f"missing runtime args: {missing}"
          PY
