name: edge-publish

on:
  push:
    branches:
      - main

permissions:
  contents: read
  packages: write
  attestations: write
  id-token: write

concurrency:
  group: edge-publish-${{ github.ref }}
  cancel-in-progress: true

jobs:
  edge-artifact:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Build edge binary archive
        run: |
          set -euo pipefail
          OUT_DIR="$RUNNER_TEMP/nocfoundry-linux-amd64"
          mkdir -p "${OUT_DIR}"
          CGO_ENABLED=0 GOOS=linux GOARCH=amd64 \
            go build \
              -trimpath \
              -ldflags="-s -w -X github.com/adrien19/noc-foundry/cmd.buildType=binary -X github.com/adrien19/noc-foundry/cmd.commitSha=${GITHUB_SHA}" \
              -o "${OUT_DIR}/nocfoundry" \
              .
          cp LICENSE README.md "${OUT_DIR}/"
          tar -C "${OUT_DIR}" -czf "$RUNNER_TEMP/nocfoundry_edge_linux_amd64.tar.gz" .

      - name: Upload edge artifact
        uses: actions/upload-artifact@v4
        with:
          name: nocfoundry_edge_linux_amd64
          path: ${{ runner.temp }}/nocfoundry_edge_linux_amd64.tar.gz
          if-no-files-found: error

  edge-image:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ github.token }}

      - name: Generate Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository }}
          tags: |
            type=raw,value=edge
            type=sha,format=short,prefix=sha-

      - name: Build and push edge image
        id: build
        uses: docker/build-push-action@v6
        with:
          context: .
          file: docker/Dockerfile
          platforms: linux/amd64,linux/arm64
          push: true
          labels: ${{ steps.meta.outputs.labels }}
          tags: ${{ steps.meta.outputs.tags }}
          build-args: |
            BUILD_TYPE=container
            COMMIT_SHA=${{ github.sha }}

      - name: Attest image provenance
        uses: actions/attest-build-provenance@v2
        with:
          subject-name: ghcr.io/${{ github.repository }}
          subject-digest: ${{ steps.build.outputs.digest }}
          push-to-registry: true
