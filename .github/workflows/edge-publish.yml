name: edge-publish

on:
  push:
    branches:
      - main

permissions:
  contents: read
  packages: write
  attestations: write
  id-token: write

concurrency:
  group: edge-publish-${{ github.ref }}
  cancel-in-progress: true

jobs:
  edge-artifact:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Setup Go
        uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version-file: go.mod

      # Edge binary is intentionally linux/amd64-only; multi-platform
      # binaries are produced by the release-artifacts workflow.
      - name: Build edge binary archive
        run: |
          set -euo pipefail
          OUT_DIR="$RUNNER_TEMP/nocfoundry-linux-amd64"
          mkdir -p "${OUT_DIR}"
          CGO_ENABLED=0 GOOS=linux GOARCH=amd64 \
            go build \
              -trimpath \
              -ldflags="-s -w -X github.com/adrien19/noc-foundry/cmd.buildType=binary -X github.com/adrien19/noc-foundry/cmd.commitSha=${GITHUB_SHA}" \
              -o "${OUT_DIR}/nocfoundry" \
              .
          cp LICENSE README.md "${OUT_DIR}/"
          tar -C "${OUT_DIR}" -czf "$RUNNER_TEMP/nocfoundry_edge_linux_amd64.tar.gz" .

      - name: Upload edge artifact
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7.0.0
        with:
          name: nocfoundry_edge_linux_amd64
          path: ${{ runner.temp }}/nocfoundry_edge_linux_amd64.tar.gz
          if-no-files-found: error

  edge-image:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Setup Docker Buildx
        uses: docker/setup-buildx-action@4d04d5d9486b7bd6fa91e7baf45bbb4f8b9deedd # v4.0.0

      - name: Login to GHCR
        uses: docker/login-action@4907a6ddec9925e35a0a9e82d7399ccc52663121 # v4.1.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ github.token }}

      - name: Generate Docker metadata
        id: meta
        uses: docker/metadata-action@030e881283bb7a6894de51c315a6bfe6a94e05cf # v6.0.0
        with:
          images: ghcr.io/${{ github.repository }}
          tags: |
            type=raw,value=edge
            type=sha,format=short,prefix=sha-

      - name: Build and push edge image
        id: build
        uses: docker/build-push-action@d08e5c354a6adb9ed34480a06d141179aa583294 # v7.0.0
        with:
          context: .
          file: docker/Dockerfile
          platforms: linux/amd64,linux/arm64
          push: true
          labels: ${{ steps.meta.outputs.labels }}
          tags: ${{ steps.meta.outputs.tags }}
          build-args: |
            BUILD_TYPE=container
            COMMIT_SHA=${{ github.sha }}

      - name: Attest image provenance
        uses: actions/attest-build-provenance@e8998f949152b193b063cb0ec769d69d929409be # v2
        with:
          subject-name: ghcr.io/${{ github.repository }}
          subject-digest: ${{ steps.build.outputs.digest }}
          push-to-registry: true
