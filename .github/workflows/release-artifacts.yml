name: release-artifacts

on:
  release:
    types:
      - published
  workflow_dispatch:
    inputs:
      tag:
        description: Release tag to publish artifacts for, for example v0.1.0
        required: true
        type: string

permissions:
  contents: write
  packages: write
  attestations: write
  id-token: write

jobs:
  prepare:
    runs-on: ubuntu-latest
    outputs:
      tag: ${{ steps.vars.outputs.tag }}
      version: ${{ steps.vars.outputs.version }}
    steps:
      - name: Determine release version
        id: vars
        run: |
          set -euo pipefail
          if [[ "${GITHUB_EVENT_NAME}" == "release" ]]; then
            TAG="${{ github.event.release.tag_name }}"
          else
            TAG="${{ inputs.tag }}"
          fi

          if [[ -z "${TAG}" || "${TAG}" != v* ]]; then
            echo "Release tag must be in the form vX.Y.Z" >&2
            exit 1
          fi

          echo "tag=${TAG}" >> "$GITHUB_OUTPUT"
          echo "version=${TAG#v}" >> "$GITHUB_OUTPUT"

  build-binaries:
    runs-on: ubuntu-latest
    needs: prepare
    strategy:
      fail-fast: false
      matrix:
        include:
          - goos: linux
            goarch: amd64
            archive: tar.gz
          - goos: linux
            goarch: arm64
            archive: tar.gz
          - goos: darwin
            goarch: amd64
            archive: tar.gz
          - goos: darwin
            goarch: arm64
            archive: tar.gz
          - goos: windows
            goarch: amd64
            archive: zip
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          ref: ${{ needs.prepare.outputs.tag }}

      - name: Setup Go
        uses: actions/setup-go@40f1582b2485089dde7abd97c1529aa768e1baff # v5
        with:
          go-version-file: go.mod

      - name: Build binary archive
        env:
          VERSION: ${{ needs.prepare.outputs.version }}
          TAG: ${{ needs.prepare.outputs.tag }}
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          ARCHIVE: ${{ matrix.archive }}
        run: |
          set -euo pipefail

          OUT_DIR="$RUNNER_TEMP/build/${GOOS}_${GOARCH}"
          mkdir -p "${OUT_DIR}"

          BIN_NAME="nocfoundry"
          if [[ "${GOOS}" == "windows" ]]; then
            BIN_NAME="nocfoundry.exe"
          fi

          CGO_ENABLED=0 GOOS="${GOOS}" GOARCH="${GOARCH}" \
            go build \
              -trimpath \
              -ldflags="-s -w -X github.com/adrien19/noc-foundry/cmd.buildType=binary -X github.com/adrien19/noc-foundry/cmd.commitSha=${GITHUB_SHA}" \
              -o "${OUT_DIR}/${BIN_NAME}" \
              .

          cp LICENSE README.md "${OUT_DIR}/"

          if [[ "${ARCHIVE}" == "zip" ]]; then
            ARCHIVE_NAME="nocfoundry_${VERSION}_${GOOS}_${GOARCH}.zip"
            (
              cd "${OUT_DIR}"
              zip -q -r "$RUNNER_TEMP/${ARCHIVE_NAME}" .
            )
          else
            ARCHIVE_NAME="nocfoundry_${VERSION}_${GOOS}_${GOARCH}.tar.gz"
            tar -C "${OUT_DIR}" -czf "$RUNNER_TEMP/${ARCHIVE_NAME}" .
          fi

          echo "ARCHIVE_NAME=${ARCHIVE_NAME}" >> "$GITHUB_ENV"

      - name: Upload binary artifact
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: ${{ env.ARCHIVE_NAME }}
          path: ${{ runner.temp }}/${{ env.ARCHIVE_NAME }}
          if-no-files-found: error

  publish-release-assets:
    runs-on: ubuntu-latest
    needs:
      - prepare
      - build-binaries
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Download binary artifacts
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4
        with:
          path: ${{ runner.temp }}/release-assets
          merge-multiple: true

      - name: Generate checksums
        working-directory: ${{ runner.temp }}/release-assets
        run: |
          set -euo pipefail
          sha256sum *.tar.gz *.zip > checksums.txt

      - name: Ensure GitHub release exists
        env:
          GH_TOKEN: ${{ github.token }}
          TAG: ${{ needs.prepare.outputs.tag }}
        run: |
          gh release view "${TAG}" >/dev/null 2>&1 || \
            gh release create "${TAG}" --title "${TAG}" --notes "Release artifacts for ${TAG}"

      - name: Upload release assets
        env:
          GH_TOKEN: ${{ github.token }}
          TAG: ${{ needs.prepare.outputs.tag }}
        working-directory: ${{ runner.temp }}/release-assets
        run: |
          gh release upload "${TAG}" ./* --clobber

      - name: Attest binary provenance
        uses: actions/attest-build-provenance@96b4a1ef7235a096b17240c259729fdd70c83d45 # v2
        with:
          subject-path: ${{ runner.temp }}/release-assets/*

  publish-release-image:
    runs-on: ubuntu-latest
    needs: prepare
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          ref: ${{ needs.prepare.outputs.tag }}

      - name: Setup Docker Buildx
        uses: docker/setup-buildx-action@8d2750c68a42422c14e847fe6c8ac0403b4cbd6f # v3

      - name: Login to GHCR
        uses: docker/login-action@c94ce9fb468520275223c153574b00df6fe4bcc9 # v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ github.token }}

      - name: Generate Docker metadata
        id: meta
        uses: docker/metadata-action@c299e40c65443455700f0fdfc63efafe5b349051 # v5
        with:
          images: ghcr.io/${{ github.repository }}
          tags: |
            type=raw,value=${{ needs.prepare.outputs.tag }}
            type=raw,value=latest

      - name: Build and push release image
        id: build
        uses: docker/build-push-action@10e90e3645eae34f1e60eeb005ba3a3d33f178e8 # v6
        with:
          context: .
          file: docker/Dockerfile
          platforms: linux/amd64,linux/arm64
          push: true
          labels: ${{ steps.meta.outputs.labels }}
          tags: ${{ steps.meta.outputs.tags }}
          build-args: |
            BUILD_TYPE=container
            COMMIT_SHA=${{ github.sha }}

      - name: Attest image provenance
        uses: actions/attest-build-provenance@96b4a1ef7235a096b17240c259729fdd70c83d45 # v2
        with:
          subject-name: ghcr.io/${{ github.repository }}
          subject-digest: ${{ steps.build.outputs.digest }}
          push-to-registry: true
