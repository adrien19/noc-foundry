name: release-artifacts

on:
  push:
    tags:
      - "v*.*.*"
  workflow_dispatch:
    inputs:
      tag:
        description: Release tag to publish artifacts for, for example v0.1.0
        required: true
        type: string

permissions:
  contents: write
  packages: write
  attestations: write
  id-token: write

jobs:
  prepare:
    runs-on: ubuntu-latest
    outputs:
      tag: ${{ steps.vars.outputs.tag }}
      version: ${{ steps.vars.outputs.version }}
      commit: ${{ steps.vars.outputs.commit }}
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0

      - name: Determine release version
        id: vars
        run: |
          set -euo pipefail
          if [[ "${GITHUB_EVENT_NAME}" == "workflow_dispatch" ]]; then
            TAG="${{ inputs.tag }}"
          else
            TAG="${GITHUB_REF#refs/tags/}"
          fi

          if [[ -z "${TAG}" || ! "${TAG}" =~ ^v[0-9]+\.[0-9]+\.[0-9]+.*$ ]]; then
            echo "Release tag must be in the form vX.Y.Z" >&2
            exit 1
          fi

          echo "tag=${TAG}" >> "$GITHUB_OUTPUT"
          echo "version=${TAG#v}" >> "$GITHUB_OUTPUT"
          COMMIT="$(git rev-list -n 1 "${TAG}")"
          echo "commit=${COMMIT}" >> "$GITHUB_OUTPUT"

  ensure-release:
    runs-on: ubuntu-latest
    needs: prepare
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          ref: ${{ needs.prepare.outputs.tag }}

      - name: Ensure GitHub release exists
        uses: softprops/action-gh-release@72f2c25fcb47643c292f7107632f7a47c1df5cd8 # v2.3.2
        with:
          tag_name: ${{ needs.prepare.outputs.tag }}
          name: ${{ needs.prepare.outputs.tag }}
          generate_release_notes: true
          prerelease: ${{ contains(needs.prepare.outputs.tag, 'rc') || contains(needs.prepare.outputs.tag, 'beta') || contains(needs.prepare.outputs.tag, 'alpha') }}

  build-binaries:
    runs-on: ubuntu-latest
    needs:
      - prepare
      - ensure-release
    strategy:
      fail-fast: false
      matrix:
        include:
          - goos: linux
            goarch: amd64
            archive: tar.gz
          - goos: linux
            goarch: arm64
            archive: tar.gz
          - goos: linux
            goarch: arm
            goarm: "7"
            archive: tar.gz
          - goos: darwin
            goarch: amd64
            archive: tar.gz
          - goos: darwin
            goarch: arm64
            archive: tar.gz
          - goos: windows
            goarch: amd64
            archive: zip
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          ref: ${{ needs.prepare.outputs.tag }}

      - name: Setup Go
        uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version-file: go.mod

      - name: Build binary archive
        env:
          VERSION: ${{ needs.prepare.outputs.version }}
          TAG: ${{ needs.prepare.outputs.tag }}
          COMMIT_SHA: ${{ needs.prepare.outputs.commit }}
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          GOARM: ${{ matrix.goarm }}
          ARCHIVE: ${{ matrix.archive }}
        run: |
          set -euo pipefail

          TARGET="${GOOS}_${GOARCH}"
          if [[ -n "${GOARM}" ]]; then
            TARGET="${TARGET}v${GOARM}"
          fi

          OUT_DIR="$RUNNER_TEMP/build/${TARGET}"
          mkdir -p "${OUT_DIR}"

          BIN_NAME="nocfoundry"
          if [[ "${GOOS}" == "windows" ]]; then
            BIN_NAME="nocfoundry.exe"
          fi

          CGO_ENABLED=0 GOOS="${GOOS}" GOARCH="${GOARCH}" GOARM="${GOARM}" \
            go build \
              -trimpath \
              -ldflags="-s -w -X github.com/adrien19/noc-foundry/cmd.versionNum=${VERSION} -X github.com/adrien19/noc-foundry/cmd.buildType=binary -X github.com/adrien19/noc-foundry/cmd.commitSha=${COMMIT_SHA}" \
              -o "${OUT_DIR}/${BIN_NAME}" \
              .

          cp LICENSE README.md "${OUT_DIR}/"

          if [[ "${ARCHIVE}" == "zip" ]]; then
            ARCHIVE_NAME="nocfoundry_${VERSION}_${TARGET}.zip"
            (
              cd "${OUT_DIR}"
              zip -q -r "$RUNNER_TEMP/${ARCHIVE_NAME}" .
            )
          else
            ARCHIVE_NAME="nocfoundry_${VERSION}_${TARGET}.tar.gz"
            tar -C "${OUT_DIR}" -czf "$RUNNER_TEMP/${ARCHIVE_NAME}" .
          fi

          (
            cd "$RUNNER_TEMP"
            sha256sum "${ARCHIVE_NAME}" > "${ARCHIVE_NAME}.sha256"
          )
          echo "ARCHIVE_NAME=${ARCHIVE_NAME}" >> "$GITHUB_ENV"

      - name: Upload release assets
        uses: softprops/action-gh-release@72f2c25fcb47643c292f7107632f7a47c1df5cd8 # v2.3.2
        with:
          tag_name: ${{ needs.prepare.outputs.tag }}
          fail_on_unmatched_files: true
          files: |
            ${{ runner.temp }}/${{ env.ARCHIVE_NAME }}
            ${{ runner.temp }}/${{ env.ARCHIVE_NAME }}.sha256

      - name: Attest binary provenance
        uses: actions/attest-build-provenance@96b4a1ef7235a096b17240c259729fdd70c83d45 # v2
        with:
          subject-path: |
            ${{ runner.temp }}/${{ env.ARCHIVE_NAME }}
            ${{ runner.temp }}/${{ env.ARCHIVE_NAME }}.sha256

  publish-release-image:
    runs-on: ubuntu-latest
    needs:
      - prepare
      - build-binaries
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          ref: ${{ needs.prepare.outputs.tag }}

      - name: Setup Docker Buildx
        uses: docker/setup-buildx-action@8d2750c68a42422c14e847fe6c8ac0403b4cbd6f # v3

      - name: Login to GHCR
        uses: docker/login-action@c94ce9fb468520275223c153574b00df6fe4bcc9 # v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ github.token }}

      - name: Generate Docker metadata
        id: meta
        uses: docker/metadata-action@c299e40c65443455700f0fdfc63efafe5b349051 # v5
        with:
          images: ghcr.io/${{ github.repository }}
          tags: |
            type=raw,value=${{ needs.prepare.outputs.tag }}
            type=raw,value=${{ needs.prepare.outputs.version }}
            type=raw,value=latest

      - name: Build and push release image
        id: build
        uses: docker/build-push-action@10e90e3645eae34f1e60eeb005ba3a3d33f178e8 # v6
        with:
          context: .
          file: docker/Dockerfile
          platforms: linux/amd64,linux/arm64
          push: true
          labels: ${{ steps.meta.outputs.labels }}
          tags: ${{ steps.meta.outputs.tags }}
          build-args: |
            BUILD_TYPE=container
            COMMIT_SHA=${{ needs.prepare.outputs.commit }}

      - name: Attest image provenance
        uses: actions/attest-build-provenance@96b4a1ef7235a096b17240c259729fdd70c83d45 # v2
        with:
          subject-name: ghcr.io/${{ github.repository }}
          subject-digest: ${{ steps.build.outputs.digest }}
          push-to-registry: true
