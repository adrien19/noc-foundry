title = "NOCFoundry Docs"
# baseURL is overridden by build-versioned-site.sh at build time
baseURL = "https://docs.nocfoundry.com/dev/"
languageCode = "en-us"
defaultContentLanguage = "en"
defaultContentLanguageInSubdir = false
relativeURLs = false
enableGitInfo = true
enableRobotsTXT = true

[languages]
  [languages.en]
    languageName = "English"
    weight = 1
    contentDir = "content/en"

[module]
  proxy = "direct"
  [module.hugoVersion]
    extended = true
    min = "0.146.0"
  [[module.imports]]
    path = "github.com/google/docsy"
  [[module.imports]]
    path = "github.com/martignoni/hugo-notice"

[params]
  description = "NOCFoundry is a network-operations-focused MCP server for network devices, validation workflows, and protected operational APIs."
  copyright = "Adrien Ndikumana"
  github_repo = "https://github.com/adrien19/noc-foundry"
  github_project_repo = "https://github.com/adrien19/noc-foundry"
  github_branch = "main"
  github_subdir = ".webdocs"
  offlineSearch = true
  offlineSearchMaxResults = 12
  pagefind = false
  version_menu = "Versions"
  [params.ui]
    ul_show = 100
    showLightDarkModeMenu = true
    breadcrumb_disable = false
    sidebar_menu_foldable = true
    sidebar_menu_compact = false
  [params.ui.feedback]
    enable = true
    yes = "Glad to hear it. Please <a href=\"https://github.com/adrien19/noc-foundry/issues/new\">tell us what helped</a>."
    no = "Sorry to hear that. Please <a href=\"https://github.com/adrien19/noc-foundry/issues/new\">tell us what needs improvement</a>."
  [params.ui.readingtime]
    enable = true

[[menu.main]]
  name = "GitHub"
  weight = 50
  url = "https://github.com/adrien19/noc-foundry"
  pre = "<i class='fa-brands fa-github'></i>"

[markup.goldmark.renderer]
  unsafe = true

[markup.highlight]
  noClasses = false
  style = "tango"
